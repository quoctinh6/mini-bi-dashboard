version: '3.8'

services:
  # 1. Khởi tạo Database MySQL
  db:
    image: mysql:8.0
    container_name: kernel404_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mini_bi_dashboard
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    # TEST CASE 1: Kiểm tra xem MySQL đã khởi động xong và sẵn sàng nhận kết nối chưa
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Khởi tạo Backend Node.js
  backend:
    build: ./backend
    container_name: kernel404_backend
    ports:
      - "5000:5000"
    # Load đầy đủ biến từ backend/.env (bao gồm GEMINI_API_KEY, JWT_SECRET,...)
    env_file:
      - ./backend/.env
    environment:
      # Ghi đè DATABASE_URL để dùng host 'db' của Docker thay vì localhost
      - DATABASE_URL=mysql://root:rootpassword@db:3306/mini_bi_dashboard
      - PORT=5000
    # Map thư mục code gốc vào Docker để bắt sự kiện thay đổi code (Hot Reload)
    volumes:
      - ./backend:/app
      - /app/node_modules 
    command: >
      sh -c "npm install &&
             npx prisma db push && 
             npx prisma db seed && # Xóa hoặc comment dòng này nếu không muốn tạo 50,000 dòng dữ liệu mẫu
             npm run dev"
    depends_on:
      db:
        condition: service_healthy # Chỉ chạy Backend KHI VÀ CHỈ KHI Test Case của DB báo Xanh (Healthy)
    # TEST CASE 2: Kiểm tra xem API Backend đã thực sự mở cổng 5000 chưa
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 3. Khởi tạo Frontend Next.js
  frontend:
    build: 
      context: ./frontend
      # Bỏ qua stage builder/runner production tĩnh, chỉ lấy stage 'deps' để chạy dev server
      target: deps 
    container_name: kernel404_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development # Ép force môi trường Dev để cài đủ TypeScript
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Xóa cache rác và cài bổ sung nếu package thay đổi, sau đó chạy Dev có Hot Reload
    command: sh -c "rm -rf .next && npm install && npm run dev"
    depends_on:
      backend:
        condition: service_healthy

# Lưu trữ dữ liệu DB không bị mất khi tắt Docker
volumes:
  db_data: