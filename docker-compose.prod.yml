services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mini_bi_dashboard
    volumes:
      - db_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:rootpassword@db:3306/mini_bi_dashboard
      - PORT=5000
    command: sh -c "npx prisma db push && node server.js"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      target: runner
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
    command: node server.js
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  db_data_prod:
